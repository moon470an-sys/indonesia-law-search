name: Daily Incremental Crawl

# 매일 오전 6시 (Asia/Jakarta = UTC+7) ⇒ UTC 23:00 (전날) 또는 22:00 trigger.
# 한국 시간(KST=UTC+9) 기준 오전 7시: UTC 22:00.
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      keys:
        description: "Ministry keys to run (space-separated). Empty = all configured scrapers."
        required: false
        default: ""
      full:
        description: "Force full crawl (ignore known_source_urls)."
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: crawler/requirements.txt

      - name: Install Python deps
        working-directory: crawler
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright (chromium only)
        run: |
          python -m playwright install --with-deps chromium

      - name: Materialize laws.db from JSONL + translations
        run: python -m crawler.build_db

      - name: Run incremental crawl
        run: |
          python -m crawler.update_all ${{ github.event.inputs.keys }} ${{ github.event.inputs.full == 'true' && '--full' || '' }}

      - name: Read summary
        id: summary
        run: |
          if [ ! -f data/pending/today.summary.json ]; then
            echo "no summary written, skipping commit"
            echo "total_new=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          total=$(python -c "import json; print(json.load(open('data/pending/today.summary.json'))['total_new'])")
          echo "total_new=$total" >> "$GITHUB_OUTPUT"
          python -c "import json; d=json.load(open('data/pending/today.summary.json')); [print(f'  - {k}: new={v.get(\"new_in_db\",0)} chunks={len(v.get(\"chunk_files\",[]))} {(\"err: \"+v[\"error\"]) if v.get(\"error\") else \"\"}') for k,v in d['ministries'].items()]"

      - name: Commit changes (if any)
        if: steps.summary.outputs.total_new != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/laws data/pending/today.summary.json data/pending/chunks
          if git diff --cached --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git commit -m "chore(daily-crawl): +${{ steps.summary.outputs.total_new }} new pending laws"
          git push

      - name: Open / update tracking issue
        if: steps.summary.outputs.total_new != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('data/pending/today.summary.json', 'utf8'));
            const lines = Object.entries(summary.ministries).map(([k, v]) => {
              if (v.error) return `- **${k}**: error — \`${v.error}\``;
              return `- **${k}** (\`${v.ministry_code}\`): new=${v.new_in_db}, chunks=${v.chunk_files.length}`;
            });
            const body = [
              `## 일일 크롤 결과 — ${summary.date}`,
              ``,
              `Total new pending: **${summary.total_new}**`,
              ``,
              ...lines,
              ``,
              `### 다음 단계`,
              `로컬에서 \`/translate-pending\` 슬래시 커맨드를 실행해 번역을 진행해주세요.`,
            ].join('\n');
            const title = `[daily-crawl] ${summary.date}: +${summary.total_new} pending`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['daily-crawl', 'pending-translation'],
            });
