name: fix-dates

# Re-fetches every peraturan.go.id row whose promulgation_date is NULL,
# epoch, or year-mismatched, in 8 parallel shards. Final job merges
# all per-shard patch files into the JSONL source-of-truth and commits.
#
# Trigger manually from GitHub Actions UI (workflow_dispatch).

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install httpx[http2] beautifulsoup4
      - name: phase 2 (shard ${{ matrix.shard }}/8)
        run: |
          python -X utf8 -m scripts.fix_promulgation_dates \
            --phase 2 --workers 16 --shard ${{ matrix.shard }}/8
      - uses: actions/upload-artifact@v4
        with:
          name: fixed-shard-${{ matrix.shard }}
          path: data/fixed_promulgation_dates.jsonl

  merge:
    needs: fix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: combine shards
        run: |
          mkdir -p data
          : > data/fixed_promulgation_dates.jsonl
          for f in artifacts/fixed-shard-*/fixed_promulgation_dates.jsonl; do
            cat "$f" >> data/fixed_promulgation_dates.jsonl
          done
          wc -l data/fixed_promulgation_dates.jsonl
      - name: merge into JSONL source
        run: python -X utf8 -m scripts.fix_promulgation_dates --phase merge
      - name: rebuild laws.db from JSONL
        run: |
          pip install httpx beautifulsoup4
          python -X utf8 -m crawler.build_db || true
      - name: commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/laws/peraturan_go_id.jsonl
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "data: re-fetch promulgation_date from peraturan.go.id"
          git push origin HEAD:main
