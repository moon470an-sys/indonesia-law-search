name: Probe JDIH sites (Playwright)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawler/requirements.txt

      - name: Install deps
        working-directory: crawler
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright chromium
        run: python -m playwright install --with-deps chromium

      - name: Run JDIH per-host probe
        run: python -m crawler.probe_jdih_pw
        continue-on-error: true

      - name: Run JDIHN central + sample probe
        run: python -m crawler.probe_jdihn
        continue-on-error: true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: probe-jdih
          path: |
            data/probe_jdih_pw.json
            data/probe_jdihn.json
            data/probe/
          if-no-files-found: ignore
          retention-days: 14
