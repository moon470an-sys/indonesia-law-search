name: Daily Crawl

on:
  schedule:
    # KST 06:00 = UTC 21:00 (전일)
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: crawler/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r crawler/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Apply existing translation JSONs (for new rows / re-crawl)
        run: |
          shopt -s nullglob
          for f in translations/*.json; do
            python -m crawler.import_translations "$f"
          done

      - name: Run crawlers
        run: python -m crawler.run_all

      - name: Export pending translations
        run: python -m crawler.export_pending

      - name: Commit DB + pending markdown
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/laws.db data/pending/*.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: daily crawl $(date -u +%F)"
            git push
          fi
